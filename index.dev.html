<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fretboard — dev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <div class="app">
    <header class="app-head">
      <div class="brand">
        <h1>Fretboard</h1>
        <span class="sub">Nashville · 3-string voicing explorer</span>
      </div>
      <div class="controls">
        <div class="chaos">
          <label for="chaos">Chaos</label>
          <input id="chaos" type="range" min="0" max="100" value="0" />
          <span class="val" id="chaosVal">0.00</span>
        </div>
        <button class="shuffle" id="shuffle">Shuffle</button>
      </div>
    </header>

    <div class="meta-strip">
      <span class="chip seq" id="seqChips">— → — → — → —</span>
      <span class="chip">strings <b id="ssChip">—</b></span>
      <span class="chip">seed <b id="seedChip">1</b></span>
      <span class="chip">
        common
        <span class="commonness-bar"><i id="commonBar" style="transform:scaleX(0)"></i></span>
      </span>
      <div class="legend">
        <span><i class="sw" style="background:#f5b94a"></i>root</span>
        <span><i class="sw" style="background:#2bbfa8"></i>note</span>
        <span><i class="sw" style="background:#ff8a45"></i>outside</span>
        <span><i class="sw" style="background:#5eead4"></i>hammer</span>
        <span><i class="sw" style="background:#c08cff"></i>pull</span>
        <span><i class="sw" style="background:#7c9cff"></i>slide</span>
        <span><i class="sw" style="background:#ff7eb6"></i>bend</span>
      </div>
    </div>

    <div class="stage-wrap">
      <div id="stage-mount"></div>
    </div>

    <footer class="hint">strings vertical · frets horizontal · 12-fret relative window · no fret numbers</footer>
  </div>

  <!-- ============================================================
       STUB ENGINE — DELETE this <script> at integration and load the
       real engine instead (it exposes the same global `Fretboard`).
       ============================================================ -->
  <script src="src/engine.stub.js"></script>

  <!-- UI renderer (keep) -->
  <script src="src/ui.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', function () {
      window.FretboardUI.init('stage-mount');
    });
  </script>
</body>
</html>
